# Production stack for a single VPS. Pulls prebuilt images from GHCR.
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Image refs (WEB_IMAGE / CMS_IMAGE) and secrets come from .env.production.
name: green-orange

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Extra databases created alongside ${POSTGRES_DB} (cms) on a FRESH volume:
      # Authentik gets `authentik`, crm-api gets `crm`, both in this same
      # container. NOTE: the init script only runs on first boot of an empty
      # volume — on an EXISTING prod DB you must create each one by hand (see
      # DEPLOY.md §6a Authentik / §6b CRM).
      POSTGRES_MULTIPLE_DATABASES: authentik,crm
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    # Not published to the host — only reachable on the internal docker network.

  cms:
    image: ${CMS_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Browser origins allowed to call the API (the web app's contact form).
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Payload `serverURL` — makes uploaded media URLs absolute (public CMS origin).
      CMS_PUBLIC_URL: ${CMS_PUBLIC_URL}
      # Uploads persist on the `media` volume across deploys.
      MEDIA_DIR: /app/apps/cms/media
    volumes:
      - media:/app/apps/cms/media
    networks: [internal]
    # The image entrypoint runs `payload migrate` before starting.

  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    depends_on: [cms]
    environment:
      # SSR/ISR reads hit the CMS directly over the internal network (no TLS
      # hairpin). The browser uses NEXT_PUBLIC_CMS_URL, which is baked into the
      # image at build time by the GitHub Actions workflow.
      CMS_INTERNAL_URL: http://cms:3001
    networks: [internal]

  # ── CRM API — FastAPI (INTERNAL ONLY, never exposed) ────────────────────────
  # The CRM's backend. Reachable ONLY on the internal docker network — note the
  # deliberate absence of a `ports:` block, so nothing outside the network (not
  # even the host) can reach it. crm-web calls it server-side at
  # http://crm-api:8000; the browser never touches it.
  crm-api:
    image: ${CRM_API_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # crm-api's own `crm` database in the shared postgres container (reuses the
      # POSTGRES creds, same pattern as Authentik). The DB must exist first — on
      # an existing prod volume create it by hand (see DEPLOY.md §6b).
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/crm
      # Prod validates Authentik-issued OIDC tokens — no local username/password.
      AUTH_MODE: oidc
      OIDC_ISSUER: https://${AUTH_DOMAIN}/application/o/crm/
      OIDC_AUDIENCE: ${CRM_OIDC_CLIENT_ID}
      # Calls arrive server-to-server (no browser Origin), so CORS is belt-and-braces.
      CORS_ORIGINS: https://${CRM_DOMAIN}
    networks: [internal]
    # The image entrypoint runs `alembic upgrade head` before starting uvicorn.

  # ── CRM dashboard — Next.js (published at CRM_DOMAIN) ───────────────────────
  crm-web:
    image: ${CRM_WEB_IMAGE}
    restart: unless-stopped
    depends_on: [crm-api]
    environment:
      # Server-only, read at RUNTIME: the internal backend URL. Never inlined
      # into the client bundle, so crm-api stays unexposed.
      CRM_API_URL: http://crm-api:8000
      # Auth.js / Authentik OIDC. AUTH_TRUST_HOST makes Auth.js honor the
      # X-Forwarded-Proto https that Caddy injects (TLS terminates upstream), so
      # the OAuth callback URL is built as https and matches what's registered.
      AUTH_SECRET: ${CRM_AUTH_SECRET}
      AUTH_URL: https://${CRM_DOMAIN}
      AUTH_TRUST_HOST: 'true'
      AUTH_AUTHENTIK_ID: ${CRM_OIDC_CLIENT_ID}
      AUTH_AUTHENTIK_SECRET: ${CRM_OIDC_CLIENT_SECRET}
      AUTH_AUTHENTIK_ISSUER: https://${AUTH_DOMAIN}/application/o/crm/
    networks: [internal]

  # ── Authentik (identity provider) ──────────────────────────────────────────
  # The shared IdP for the CRM's OIDC login. Uses the prebuilt public image (no
  # CI build) and the `authentik` database in the postgres container above. Its
  # own redis is a cache, not a DB. Reachable publicly at AUTH_DOMAIN via Caddy.
  authentik-redis:
    image: docker.io/library/redis:alpine
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      start_period: 20s
      interval: 30s
      timeout: 3s
      retries: 5
    volumes:
      - authentik_redis:/data
    networks: [internal]

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10}
    restart: unless-stopped
    command: server
    depends_on:
      postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      # First-boot bootstrap (fresh `authentik` DB only): creates akadmin + an API
      # token so the prod `crm` app can be registered via scripts/setup-authentik-crm.py.
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-akadmin@localhost}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    networks: [internal]

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10}
    restart: unless-stopped
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-akadmin@localhost}
    # The official template also mounts /var/run/docker.sock for managed outposts;
    # the CRM only needs plain OIDC (no outpost), so that mount is omitted.
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
      - authentik_templates:/templates
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [web, cms, crm-web, authentik-server]
    ports:
      - '3000:3000'
      - '3001:3001'
      - '3002:3002'
      - '9000:9000'
    environment:
      # Caddy substitutes these into the Caddyfile and auto-provisions TLS.
      SITE_DOMAIN: ${SITE_DOMAIN}
      CMS_DOMAIN: ${CMS_DOMAIN}
      CRM_DOMAIN: ${CRM_DOMAIN}
      AUTH_DOMAIN: ${AUTH_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # certificates + ACME account — MUST persist
      - caddy_config:/config
    networks: [internal]

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
  authentik_redis:
  authentik_media:
  authentik_certs:
  authentik_templates:

networks:
  internal:
