# Production stack for a single VPS. Pulls prebuilt images from GHCR.
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Image refs (WEB_IMAGE / CMS_IMAGE) and secrets come from .env.production.
name: yan-portf

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    # Not published to the host — only reachable on the internal docker network.

  cms:
    image: ${CMS_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      # Browser origins allowed to call the API (the web app's contact form).
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Uploads persist on the `media` volume across deploys.
      MEDIA_DIR: /app/apps/cms/media
    volumes:
      - media:/app/apps/cms/media
    networks: [internal]
    # The image entrypoint runs `payload migrate` before starting.

  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    depends_on: [cms]
    environment:
      # SSR/ISR reads hit the CMS directly over the internal network (no TLS
      # hairpin). The browser uses NEXT_PUBLIC_CMS_URL, which is baked into the
      # image at build time by the GitHub Actions workflow.
      CMS_INTERNAL_URL: http://cms:3001
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [web, cms]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks: [internal]
    # Reload every 6h so renewed certificates are picked up without downtime.
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    # Attempt renewal twice a day; no-op until a cert is within 30 days of expiry.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  media:
  certbot-www:
  letsencrypt:

networks:
  internal:
