name: Deploy

# Build + deploy only on a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  # Decide which apps actually changed since the previous release tag. An app
  # whose code (and the shared root files) is unchanged is NOT rebuilt — its
  # previous image is re-tagged to this release instead.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web_build: ${{ steps.f.outputs.web_build }}
      crm-web_build: ${{ steps.f.outputs['crm-web_build'] }}
      crm-api_build: ${{ steps.f.outputs['crm-api_build'] }}
      prev_tag: ${{ steps.f.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags + history to diff against the previous tag
      - id: f
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — building all apps."
            echo "web_build=true" >> "$GITHUB_OUTPUT"
            echo "crm-web_build=true" >> "$GITHUB_OUTPUT"
            echo "crm-api_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Diffing $PREV_TAG..HEAD"
          # An app rebuilds if its dir OR a shared root file changed.
          changed() { ! git diff --quiet "$PREV_TAG" HEAD -- "$@"; }
          # `packages` covers any shared workspace package the JS apps depend on.
          changed apps/web packages package.json bun.lock turbo.json \
            && echo "web_build=true" >> "$GITHUB_OUTPUT" \
            || echo "web_build=false" >> "$GITHUB_OUTPUT"
          # CMS is the official directus/directus image — never built here.
          changed apps/crm-web packages package.json bun.lock turbo.json \
            && echo "crm-web_build=true" >> "$GITHUB_OUTPUT" \
            || echo "crm-web_build=false" >> "$GITHUB_OUTPUT"
          # crm-api is a self-contained Python app (its own uv.lock) — no JS packages.
          changed apps/crm-api \
            && echo "crm-api_build=true" >> "$GITHUB_OUTPUT" \
            || echo "crm-api_build=false" >> "$GITHUB_OUTPUT"

  build:
    name: Build & push (${{ matrix.app }})
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push images to GHCR with the built-in GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - app: web
            dockerfile: apps/web/Dockerfile
            context: .
          - app: crm-web
            dockerfile: apps/crm-web/Dockerfile
            context: .
          # Self-contained Python app — its Dockerfile expects the app dir as context.
          - app: crm-api
            dockerfile: apps/crm-api/Dockerfile
            context: apps/crm-api
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Did THIS app change? (indexes the changes job's <app>_build output)
      - id: decide
        run: echo "build=${{ needs.changes.outputs[format('{0}_build', matrix.app)] }}" >> "$GITHUB_OUTPUT"

      # Unchanged → copy the previous release's image to this tag, no rebuild.
      # continue-on-error so a missing previous image falls back to a real build.
      - name: Re-tag previous image (no changes)
        id: retag
        if: steps.decide.outputs.build == 'false'
        continue-on-error: true
        run: |
          REPO=$(echo "${{ github.repository }}" | tr 'A-Z' 'a-z')
          IMAGE="${{ env.REGISTRY }}/${REPO}-${{ matrix.app }}"
          echo "Re-tagging $IMAGE:${{ needs.changes.outputs.prev_tag }} -> :${{ github.ref_name }}"
          docker buildx imagetools create \
            --tag "$IMAGE:${{ github.ref_name }}" \
            "$IMAGE:${{ needs.changes.outputs.prev_tag }}"

      - name: Image metadata
        id: meta
        if: steps.decide.outputs.build == 'true' || steps.retag.outcome == 'failure'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.app }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build & push
        if: steps.decide.outputs.build == 'true' || steps.retag.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* values must be baked into the web image at build time.
          build-args: |
            ${{ matrix.app == 'web' && format('NEXT_PUBLIC_CMS_URL={0}', vars.NEXT_PUBLIC_CMS_URL) || '' }}
            ${{ matrix.app == 'web' && format('NEXT_PUBLIC_SITE_URL={0}', vars.NEXT_PUBLIC_SITE_URL) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Dockhand deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the image-tag bump to the `release` branch
    steps:
      # Check out AT THE TAG so the release branch mirrors the released commit
      # exactly. The bump commit lands on top of it.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      # Pin the three app image refs to this release, then fast-forward the
      # `release` branch to <tagged commit> + this bump. Dockhand's git stack
      # tracks `release`, so this is what it pulls and deploys. The CMS is the
      # pinned official directus/directus image (no per-release build), so it's
      # not touched here.
      - name: Bump image tags and update the release branch
        run: |
          set -euo pipefail
          REPO=$(echo "${{ github.repository }}" | tr 'A-Z' 'a-z')
          TAG="${{ github.ref_name }}"
          sed -i "s|^WEB_IMAGE=.*|WEB_IMAGE=ghcr.io/${REPO}-web:${TAG}|"         deploy/deploy.env
          sed -i "s|^CRM_WEB_IMAGE=.*|CRM_WEB_IMAGE=ghcr.io/${REPO}-crm-web:${TAG}|" deploy/deploy.env
          sed -i "s|^CRM_API_IMAGE=.*|CRM_API_IMAGE=ghcr.io/${REPO}-crm-api:${TAG}|" deploy/deploy.env
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/deploy.env
          git commit -m "chore(deploy): ${TAG}"
          # release is CI-owned; force so it always equals the released commit + bump.
          git push --force origin HEAD:release

      # The webhook that tells Dockhand to git-pull `release` and redeploy lives
      # on the VPS, which is only reachable over the Pangolin tunnel — so join it
      # first, then curl. DOCKHAND_WEBHOOK_URL is the full secret-bearing URL
      # (Dockhand's tunnel-internal host:port), from Dockhand's stack webhook page.
      - name: Connect to Pangolin and trigger Dockhand
        run: |
          set -euo pipefail

          # ── 1. Install Pangolin CLI ──────────────────────────────────────
          # Use the official download script, but inject GITHUB_TOKEN to bypass anonymous API rate limits
          curl -fsSL https://static.pangolin.net/get-cli.sh | sed "s|curl -fsSL \\\"\$GITHUB_API_URL\\\"|curl -fsSL -H \\\"Authorization: Bearer ${{ github.token }}\\\" \\\"\$GITHUB_API_URL\\\"|g" | sudo bash

          # ── 2. Bring up tunnel (foreground + backgrounded) ───────────────
          sudo pangolin up \
            --id "${{ secrets.PANGOLIN_ID }}" \
            --secret "${{ secrets.PANGOLIN_SECRET }}" \
            --endpoint "${{ secrets.PANGOLIN_ENDPOINT }}" \
            --override-dns \
            --attach > /tmp/pangolin.log 2>&1 &

          # ── 3. Wait for WireGuard ────────────────────────────────────────
          echo "Waiting for WireGuard tunnel…"
          for i in $(seq 1 40); do
            grep -q "WireGuard device created" /tmp/pangolin.log && break
            sleep 2
          done
          grep -q "WireGuard device created" /tmp/pangolin.log \
            || { echo "Tunnel did not come up:"; cat /tmp/pangolin.log; exit 1; }

          # ── 4. Wait for relay (holepunch fails behind GitHub NAT) ────────
          echo "Waiting for peer path…"
          for i in $(seq 1 20); do
            grep -qE "holepunch (succeeded|connected)|point to relay" /tmp/pangolin.log 2>/dev/null && break
            sleep 2
          done
          sleep 3   # let the relay stabilise

          # ── 5. Trigger the deploy ────────────────────────────────────────
          # Dockhand pulls `release` (already pushed above) and redeploys. Retry
          # so a still-stabilising tunnel doesn't fail the release.
          echo "Triggering Dockhand webhook…"
          curl -fsS -X POST "${{ secrets.DOCKHAND_WEBHOOK_URL }}" \
            --retry 8 --retry-all-errors --retry-connrefused --max-time 90 \
            || { echo "Webhook call failed:"; cat /tmp/pangolin.log; exit 1; }
          echo "Dockhand deploy triggered for ${{ github.ref_name }}."

