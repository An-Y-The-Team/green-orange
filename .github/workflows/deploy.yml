name: Deploy

# Build + deploy only on a version tag, e.g.  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

jobs:
  # Decide which apps actually changed since the previous release tag. An app
  # whose code (and the shared root files) is unchanged is NOT rebuilt — its
  # previous image is re-tagged to this release instead.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      web_build: ${{ steps.f.outputs.web_build }}
      cms_build: ${{ steps.f.outputs.cms_build }}
      prev_tag: ${{ steps.f.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags + history to diff against the previous tag
      - id: f
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag — building both apps."
            echo "web_build=true" >> "$GITHUB_OUTPUT"
            echo "cms_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Diffing $PREV_TAG..HEAD"
          # An app rebuilds if its dir OR a shared root file changed.
          changed() { ! git diff --quiet "$PREV_TAG" HEAD -- "$@"; }
          # `packages` covers any shared workspace package both apps depend on.
          changed apps/web packages package.json bun.lock turbo.json \
            && echo "web_build=true" >> "$GITHUB_OUTPUT" \
            || echo "web_build=false" >> "$GITHUB_OUTPUT"
          changed apps/cms packages package.json bun.lock turbo.json \
            && echo "cms_build=true" >> "$GITHUB_OUTPUT" \
            || echo "cms_build=false" >> "$GITHUB_OUTPUT"

  build:
    name: Build & push (${{ matrix.app }})
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push images to GHCR with the built-in GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - app: web
            dockerfile: apps/web/Dockerfile
          - app: cms
            dockerfile: apps/cms/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Did THIS app change? (indexes the changes job's <app>_build output)
      - id: decide
        run: echo "build=${{ needs.changes.outputs[format('{0}_build', matrix.app)] }}" >> "$GITHUB_OUTPUT"

      # Unchanged → copy the previous release's image to this tag, no rebuild.
      # continue-on-error so a missing previous image falls back to a real build.
      - name: Re-tag previous image (no changes)
        id: retag
        if: steps.decide.outputs.build == 'false'
        continue-on-error: true
        run: |
          REPO=$(echo "${{ github.repository }}" | tr 'A-Z' 'a-z')
          IMAGE="${{ env.REGISTRY }}/${REPO}-${{ matrix.app }}"
          echo "Re-tagging $IMAGE:${{ needs.changes.outputs.prev_tag }} -> :${{ github.ref_name }}"
          docker buildx imagetools create \
            --tag "$IMAGE:${{ github.ref_name }}" \
            "$IMAGE:${{ needs.changes.outputs.prev_tag }}"

      - name: Image metadata
        id: meta
        if: steps.decide.outputs.build == 'true' || steps.retag.outcome == 'failure'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.app }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build & push
        if: steps.decide.outputs.build == 'true' || steps.retag.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* values must be baked into the web image at build time.
          build-args: |
            ${{ matrix.app == 'web' && format('NEXT_PUBLIC_CMS_URL={0}', vars.NEXT_PUBLIC_CMS_URL) || '' }}
            ${{ matrix.app == 'web' && format('NEXT_PUBLIC_SITE_URL={0}', vars.NEXT_PUBLIC_SITE_URL) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    # SSH is private (Pangolin network only). We join the tunnel, wait for the
    # relay path, then SSH in — all in one step so the tunnel stays alive.
    env:
      SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
      VPS_PATH: ${{ secrets.VPS_PATH }}
    steps:
      - name: Connect to Pangolin and deploy
        run: |
          set -euo pipefail

          # ── 1. Install Pangolin CLI ──────────────────────────────────────
          curl -fsSL https://static.pangolin.net/get-cli.sh | sudo bash

          # ── 2. Bring up tunnel (foreground + backgrounded) ───────────────
          sudo pangolin up \
            --id "${{ secrets.PANGOLIN_ID }}" \
            --secret "${{ secrets.PANGOLIN_SECRET }}" \
            --endpoint "${{ secrets.PANGOLIN_ENDPOINT }}" \
            --override-dns \
            --attach > /tmp/pangolin.log 2>&1 &

          # ── 3. Wait for WireGuard ────────────────────────────────────────
          echo "Waiting for WireGuard tunnel…"
          for i in $(seq 1 40); do
            grep -q "WireGuard device created" /tmp/pangolin.log && break
            sleep 2
          done
          grep -q "WireGuard device created" /tmp/pangolin.log \
            || { echo "Tunnel did not come up:"; cat /tmp/pangolin.log; exit 1; }

          # ── 4. Wait for relay (holepunch fails behind GitHub NAT) ────────
          echo "Waiting for peer path…"
          for i in $(seq 1 20); do
            grep -qE "holepunch (succeeded|connected)|point to relay" /tmp/pangolin.log 2>/dev/null && break
            sleep 2
          done
          sleep 3   # let the relay stabilise

          # ── 5. Resolve VPS address ───────────────────────────────────────
          RESOLVED_IP="${{ secrets.VPS_PANGOLIN_IP }}"
          if [ -n "$RESOLVED_IP" ]; then
            echo "Using VPS_PANGOLIN_IP=$RESOLVED_IP"
          else
            echo "Resolving $VPS_HOST via DNS…"
            for i in $(seq 1 15); do
              RESOLVED_IP=$(getent hosts "$VPS_HOST" 2>/dev/null | awk '{print $1}' | head -1) || true
              [ -n "$RESOLVED_IP" ] && break
              sleep 2
            done
            [ -n "$RESOLVED_IP" ] \
              || { echo "Could not resolve $VPS_HOST. Set VPS_PANGOLIN_IP secret."; cat /tmp/pangolin.log; exit 1; }
          fi

          # ── 6. Wait for SSH ──────────────────────────────────────────────
          echo "Waiting for SSH at $RESOLVED_IP:$VPS_PORT…"
          for i in $(seq 1 15); do nc -z -w 2 "$RESOLVED_IP" "$VPS_PORT" && break; sleep 2; done
          nc -z -w 2 "$RESOLVED_IP" "$VPS_PORT" \
            || { echo "SSH unreachable at $RESOLVED_IP:$VPS_PORT"; cat /tmp/pangolin.log; exit 1; }

          # ── 7. Deploy ────────────────────────────────────────────────────
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          REPO=$(echo "${{ github.repository }}" | tr 'A-Z' 'a-z')
          TAG="${{ github.ref_name }}"

          echo "Deploying $TAG → $RESOLVED_IP ($VPS_HOST)…"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            -p "$VPS_PORT" "${VPS_USER}@${RESOLVED_IP}" \
            "REPO='$REPO' TAG='$TAG' VPS_PATH='$VPS_PATH' bash -se" <<'REMOTE'
          set -e
          cd "$VPS_PATH"
          # Deploy target mirrors the released commit exactly. Force-sync to the
          # tag instead of `git pull --ff-only` so local drift on the VPS (e.g. an
          # untracked file that later becomes tracked upstream) can't wedge the
          # deploy. `reset --hard` only rewrites tracked paths, so gitignored
          # runtime files like .env.production and docker volumes are untouched.
          git fetch origin --tags --prune --force
          git reset --hard "refs/tags/${TAG}"
          sed -i "s|^WEB_IMAGE=.*|WEB_IMAGE=ghcr.io/${REPO}-web:${TAG}|" .env.production
          sed -i "s|^CMS_IMAGE=.*|CMS_IMAGE=ghcr.io/${REPO}-cms:${TAG}|" .env.production
          docker compose -f docker-compose.prod.yml --env-file .env.production pull
          docker compose -f docker-compose.prod.yml --env-file .env.production up -d
          docker image prune -f
          REMOTE

